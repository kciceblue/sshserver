name: DCO

on:
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number whose commits should be validated
        required: true
        type: number

jobs:
  commits:
    name: Signed-off commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Resolve pull-request revisions
        id: pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          set -euo pipefail
          metadata="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '[.base.sha, .head.sha] | @tsv')"
          IFS=$'\t' read -r base_sha head_sha <<< "$metadata"
          test -n "$base_sha"
          test -n "$head_sha"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
      # Check out the trusted base revision so a pull request cannot weaken the
      # checker it is being evaluated by.
      - name: Check out trusted base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pull_request.outputs.base_sha }}
          persist-credentials: false
      - name: Fetch pull-request commits
        env:
          HEAD_SHA: ${{ steps.pull_request.outputs.head_sha }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          git fetch --no-tags origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"
          test "$(git rev-parse "refs/remotes/pull/${PR_NUMBER}/head")" = "$HEAD_SHA"
      - name: Verify every commit has a matching sign-off
        env:
          BASE_SHA: ${{ steps.pull_request.outputs.base_sha }}
          HEAD_SHA: ${{ steps.pull_request.outputs.head_sha }}
        run: python3 scripts/check_dco.py --base "$BASE_SHA" --head "$HEAD_SHA"

  report:
    name: Publish DCO status
    if: always()
    needs: commits
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Publish result on pull-request head
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          RESULT: ${{ needs.commits.result }}
        run: |
          set -euo pipefail
          head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .head.sha)"
          state=failure
          description="Manual DCO validation failed"
          if [ "$RESULT" = success ]; then
            state=success
            description="Manual DCO validation passed"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
            -f state="$state" \
            -f context="Signed-off commits" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
