name: CI

on:
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Optional pull request number to validate and report
        required: false
        default: 0
        type: number

jobs:
  policy:
    name: Repository policy
    runs-on: ubuntu-latest
    outputs:
      validated_head_sha: ${{ steps.checked_out.outputs.head_sha }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Resolve pull-request revision
        if: inputs.pull_request_number > 0
        id: pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
        run: |
          set -euo pipefail
          head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .head.sha)"
          test -n "$head_sha"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=refs/pull/${PR_NUMBER}/head" >> "$GITHUB_OUTPUT"
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pull_request.outputs.checkout_ref || github.sha }}
          persist-credentials: false
      - name: Record checked-out pull-request revision
        if: inputs.pull_request_number > 0
        id: checked_out
        env:
          EXPECTED_HEAD_SHA: ${{ steps.pull_request.outputs.head_sha }}
        run: |
          set -euo pipefail
          checked_out_sha="$(git rev-parse HEAD)"
          test "$checked_out_sha" = "$EXPECTED_HEAD_SHA"
          echo "head_sha=$checked_out_sha" >> "$GITHUB_OUTPUT"
      - name: Run policy checks and tests
        run: make check

  report:
    name: Publish repository-policy status
    if: always() && inputs.pull_request_number > 0
    needs: policy
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      statuses: write
    steps:
      - name: Publish result on pull-request head
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pull_request_number }}
          RESULT: ${{ needs.policy.result }}
          VALIDATED_HEAD_SHA: ${{ needs.policy.outputs.validated_head_sha }}
        run: |
          set -euo pipefail
          test -n "$VALIDATED_HEAD_SHA"
          current_head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq .head.sha)"
          test "$current_head_sha" = "$VALIDATED_HEAD_SHA"
          state=failure
          description="Manual repository policy validation failed"
          if [ "$RESULT" = success ]; then
            state=success
            description="Manual repository policy validation passed"
          fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${VALIDATED_HEAD_SHA}" \
            -f state="$state" \
            -f context="Repository policy" \
            -f description="$description" \
            -f target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
